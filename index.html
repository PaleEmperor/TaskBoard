<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="A tablet-first household task board with recurring chores, multilingual support, and drag-friendly planning."
    />
    <meta name="theme-color" content="#eef4f8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HomeFlow" />
    <title>HomeFlow Board</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow background-glow-left"></div>
    <div class="background-glow background-glow-right"></div>

    <div class="app-shell">
      <div class="celebration-layer" id="celebrationLayer" aria-hidden="true"></div>
      <div class="delete-drop-zone" id="deleteDropZone" aria-hidden="true">
        <span class="delete-drop-zone-icon">🗑️</span>
        <span class="delete-drop-zone-label" id="deleteDropZoneLabel"></span>
      </div>
      <div class="claim-drop-zone" id="claimDropZone" aria-hidden="true">
        <span class="delete-drop-zone-icon">🔔</span>
        <span class="delete-drop-zone-label" id="claimDropZoneLabel"></span>
      </div>
      <header class="hero">
        <div class="hero-brand">
          <span class="hero-brand-title" id="appTitle"></span>
          <span class="hero-brand-credit">by Björn ❤️</span>
        </div>

        <section class="weather-banner" id="weatherBanner" data-weather="clear">
          <div class="weather-scene" id="weatherScene" aria-hidden="true">
            <div class="weather-symbol" id="weatherSymbol"></div>
          </div>
          <div class="weather-copy">
            <div class="weather-kicker" id="weatherKicker"></div>
            <div class="weather-mainline">
              <strong id="weatherTemp"></strong>
              <span id="weatherCondition"></span>
            </div>
            <div class="weather-subline">
              <span id="weatherPlace"></span>
              <span id="weatherDetails"></span>
            </div>
            <div class="weather-ranking" id="weatherRanking"></div>
          </div>
        </section>

        <div class="panel top-controls">
          <div class="language-toggle" id="languageToggle"></div>
          <button class="primary-button" id="quickAddButton" type="button"></button>
          <button class="ghost-button" id="todayButton" type="button"></button>
        </div>
      </header>

      <main class="dashboard">
        <section class="panel control-strip">
          <div class="refresh-note" id="refreshNote"></div>
        </section>

        <section class="board-layout">
          <div class="board-stack">
            <section class="panel board-panel">
              <div class="board-panel-header">
                <div>
                  <div class="panel-label" id="boardLabel"></div>
                  <h2 id="weekHeading"></h2>
                </div>
                <div class="board-tools">
                  <button class="ghost-button" id="prevWeekButton" type="button"></button>
                  <button class="ghost-button" id="nextWeekButton" type="button"></button>
                  <button class="claim-bell-button" id="claimBellButton" type="button" aria-label="Open claim tasks">
                    <span class="claim-bell-icon">🔔</span>
                    <span class="claim-bell-count" id="claimBellCount"></span>
                  </button>
                  <button class="tool-drawer-toggle" id="toolDrawerToggle" type="button" aria-label="Open tools">☰</button>
                </div>
              </div>
              <div class="week-grid" id="weekGrid"></div>
            </section>
            <section class="summary-grid hidden" id="summaryGrid"></section>
            <section class="focus-panel hidden" id="focusPanel"></section>
          </div>

          <aside class="tool-drawer" id="toolDrawer">
            <div class="tool-drawer-header">
              <strong id="toolDrawerTitle">Tools</strong>
              <button class="icon-button" id="toolDrawerClose" type="button" aria-label="Close tools">✕</button>
            </div>
            <section class="panel mini-section tool-panel">
              <label class="toggle-row" for="showCompletedToggle">
                <span id="showCompletedLabel">Show completed</span>
                <input id="showCompletedToggle" type="checkbox" />
              </label>
              <label class="toggle-row" for="darkModeToggle">
                <span id="darkModeLabel">Dark mode</span>
                <input id="darkModeToggle" type="checkbox" />
              </label>
            </section>
            <section class="panel mini-section tool-panel" id="familyPanel">
              <h3 id="familyHeading"></h3>
              <div class="family-dock" id="familyDock"></div>
            </section>
            <section class="panel mini-section tool-panel">
              <h3 id="savedTasksHeading"></h3>
              <div class="quick-tasks-strip saved-tasks-strip" id="savedTasksStrip"></div>
            </section>
            <section class="panel mini-section tool-panel">
              <h3 id="quickTasksHeading"></h3>
              <div class="quick-tasks-strip" id="quickTasksStrip"></div>
            </section>
            <section class="panel mini-section tool-panel tool-transfer-panel">
              <h3 id="backupHeading"></h3>
              <div class="tool-transfer-actions">
                <button class="ghost-button" id="exportDataButton" type="button"></button>
                <button class="ghost-button" id="importDataButton" type="button"></button>
                <input id="importDataInput" type="file" accept="application/json,.json" hidden />
              </div>
            </section>
          </aside>
        </section>
      </main>
    </div>

    <dialog class="task-dialog" id="taskDialog">
      <form class="task-form" id="taskForm">
        <div class="dialog-header">
          <div>
            <div class="panel-label" id="dialogEyebrow"></div>
            <h2 id="dialogTitle"></h2>
          </div>
          <button class="icon-button" id="closeDialogButton" type="button" aria-label="Close">✕</button>
        </div>

        <div class="dialog-preview">
          <div class="dialog-preview-label" id="dialogPreviewLabel"></div>
          <div class="dialog-preview-card" id="taskPreviewCard"></div>
        </div>

        <div class="form-grid">
          <label class="field field-wide">
            <span id="fieldTitleLabel"></span>
            <input id="taskTitleInput" name="title" maxlength="60" required enterkeyhint="done" autocomplete="off" />
          </label>

          <div class="field field-wide">
            <span id="fieldIconLabel"></span>
            <div class="icon-grid" id="iconGrid"></div>
            <input id="taskIconInput" name="icon" type="hidden" />
          </div>

          <label class="field">
            <span id="fieldCategoryLabel"></span>
            <select id="taskCategoryInput" name="category"></select>
          </label>

          <label class="field">
            <span id="fieldOwnerLabel"></span>
            <select id="taskOwnerInput" name="owner"></select>
          </label>

          <div class="field">
            <span id="fieldResponsibleLabel"></span>
            <div class="responsible-picker" id="taskResponsibleInput"></div>
          </div>

          <label class="field">
            <span id="fieldDayLabel"></span>
            <input id="taskDayInput" name="dueDate" type="date" required />
          </label>

          <label class="field">
            <span id="fieldTimeLabel"></span>
            <input id="taskTimeInput" name="dueTime" type="time" />
          </label>

          <label class="field">
            <span id="fieldEndTimeLabel"></span>
            <input id="taskEndTimeInput" name="endTime" type="time" />
          </label>

          <label class="field">
            <span id="fieldRepeatLabel"></span>
            <select id="taskRecurrenceInput" name="recurrence"></select>
          </label>

          <label class="field field-inline" id="intervalField">
            <span id="fieldIntervalLabel"></span>
            <input id="taskIntervalInput" name="interval" type="number" min="1" max="30" value="1" />
          </label>

          <label class="field field-inline" id="weekdayField">
            <span id="fieldWeekdayLabel"></span>
            <select id="taskWeekdayInput" name="weekday"></select>
          </label>

          <label class="field">
            <span id="fieldEffortLabel"></span>
            <select id="taskEffortInput" name="effort"></select>
          </label>

          <label class="field field-wide toggle-field" for="taskClaimableInput">
            <span id="fieldClaimableLabel"></span>
            <input id="taskClaimableInput" name="claimable" type="checkbox" />
          </label>

          <label class="field field-wide">
            <span id="fieldNotesLabel"></span>
            <textarea id="taskNotesInput" name="notes" rows="3" maxlength="180"></textarea>
          </label>
        </div>

        <div class="dialog-actions">
          <button class="ghost-button" id="deleteTaskButton" type="button"></button>
          <button class="ghost-button" id="deleteSeriesButton" type="button"></button>
          <div class="spacer"></div>
          <button class="ghost-button" id="cancelTaskButton" type="button"></button>
          <button class="primary-button" id="saveTaskButton" type="submit"></button>
        </div>
      </form>
    </dialog>

    <dialog class="task-dialog participant-dialog" id="participantDialog">
      <form class="task-form participant-form" id="participantForm">
        <div class="dialog-header">
          <div>
            <div class="panel-label" id="participantEyebrow"></div>
            <h2 id="participantTitle"></h2>
          </div>
          <button class="icon-button" id="closeParticipantDialogButton" type="button" aria-label="Close">✕</button>
        </div>

        <div class="participant-copy" id="participantCopy"></div>
        <div class="responsible-picker participant-picker" id="participantPicker"></div>

        <div class="dialog-actions">
          <div class="spacer"></div>
          <button class="ghost-button" id="cancelParticipantButton" type="button"></button>
          <button class="primary-button" id="confirmParticipantButton" type="submit"></button>
        </div>
      </form>
    </dialog>

    <dialog class="task-dialog participant-dialog claim-dialog" id="claimDialog">
      <form class="task-form participant-form" id="claimDialogForm">
        <div class="dialog-header">
          <div>
            <div class="panel-label" id="claimDialogEyebrow"></div>
            <h2 id="claimDialogTitle"></h2>
          </div>
          <button class="icon-button" id="closeClaimDialogButton" type="button" aria-label="Close">✕</button>
        </div>

        <div class="participant-copy" id="claimDialogCopy"></div>
        <div class="field field-wide">
          <span id="claimDialogWhoLabel"></span>
          <div class="responsible-picker participant-picker" id="claimDialogUserPicker"></div>
        </div>
        <div class="claim-pool-strip claim-dialog-strip" id="claimDialogList"></div>

        <div class="dialog-actions">
          <div class="spacer"></div>
          <button class="ghost-button" id="closeClaimDialogFooterButton" type="button"></button>
        </div>
      </form>
    </dialog>

    <template id="taskCardTemplate">
      <article class="task-card" draggable="true">
        <details class="task-details-shell">
          <summary class="task-summary">
            <div class="task-main">
              <div class="task-icon"></div>
              <div class="task-copy">
                <h4 class="task-title"></h4>
                <p class="task-meta"></p>
              </div>
            </div>
            <span class="task-expand-indicator"></span>
          </summary>
          <div class="task-details">
            <div class="task-badges"></div>
            <div class="task-actions">
              <button class="ghost-button small-button edit-task-button" type="button"></button>
              <button class="ghost-button small-button credit-task-button hidden" type="button"></button>
            </div>
          </div>
        </details>
        <button class="ghost-button claim-chip hidden" type="button"></button>
        <button class="complete-chip" type="button"></button>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
