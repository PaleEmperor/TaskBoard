plugins {
  id("com.android.application")
  id("org.jetbrains.kotlin.android")
}

android {
  namespace "com.homeflow.board"
  compileSdk 34

  defaultConfig {
    applicationId "com.homeflow.board"
    minSdk 26
    targetSdk 34
    versionCode 1
    versionName "1.0"
  }

  buildTypes {
    release {
      minifyEnabled false
      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

def webRoot = file("../")
def assetOutput = layout.projectDirectory.dir("src/main/assets/www")

tasks.register("syncWebAssets", Sync) {
  from(webRoot) {
    include "index.html"
    include "styles.css"
    include "app.js"
    include "manifest.webmanifest"
    include "sw.js"
    include "icons/**"
  }
  into(assetOutput)
}

afterEvaluate {
  tasks.named("preBuild").configure {
    dependsOn(tasks.named("syncWebAssets"))
  }
}

dependencies {
  implementation "androidx.webkit:webkit:1.11.0"
}
